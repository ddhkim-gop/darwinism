<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Blue circle background -->
  <circle cx="50" cy="50" r="50" fill="#3d7be6"/>

  <!-- Antenna stem -->
  <rect x="47" y="14" width="6" height="14" rx="3" fill="#b8cff7"/>
  <!-- Antenna dot -->
  <circle cx="50" cy="12" r="5" fill="#d0e2ff"/>

  <!-- Robot head (rounded rect) -->
  <rect x="22" y="28" width="56" height="44" rx="14" fill="#e8f0fe"/>

  <!-- Eyes -->
  <circle cx="37" cy="47" r="8" fill="#1a56db"/>
  <circle cx="63" cy="47" r="8" fill="#1a56db"/>
  <!-- Eye shine -->
  <circle cx="40" cy="44" r="3" fill="#00d4ff"/>
  <circle cx="66" cy="44" r="3" fill="#00d4ff"/>

  <!-- Smile -->
  <path d="M 38 60 Q 50 68 62 60" stroke="#8fb0e8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="34" y="70" width="32" height="18" rx="8" fill="#c5d8f8"/>
  <!-- Body detail line -->
  <line x1="50" y1="72" x2="50" y2="86" stroke="#8fb0e8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
